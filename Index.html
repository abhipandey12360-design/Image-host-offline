<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Web Builder & Previewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background: #eef2f3; overflow: hidden; }
        
        /* Sidebar/Builder Panel */
        .builder-panel { width: 350px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 4px 0 10px rgba(0,0,0,0.15); z-index: 10; }
        .builder-panel h2 { font-size: 20px; border-bottom: 2px solid #34495e; padding-bottom: 10px; color: #1abc9c; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; color: #bdc3c7; }
        input, select { padding: 10px; border: none; border-radius: 4px; background: #34495e; color: white; width: 100%; }
        input[type="file"] { background: transparent; padding: 5px 0; }
        
        /* Preview Workspace */
        .preview-workspace { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; }
        
        /* Generated Dynamic Website Canvas */
        .website-canvas { width: 100%; max-width: 800px; background: white; min-height: 500px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        
        /* Dynamic Components inside Canvas */
        .hero-banner { background: #34495e; color: white; padding: 60px 20px; text-align: center; position: relative; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; background-size: cover; background-position: center; }
        .hero-banner h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.6); }
        
        .content-section { padding: 40px 20px; display: flex; gap: 20px; align-items: center; }
        .content-section.reverse { flex-direction: row-reverse; }
        .content-text { flex: 1; }
        .content-text h3 { font-size: 24px; margin-bottom: 10px; color: #2c3e50; }
        .content-text p { color: #7f8c8d; line-height: 1.6; }
        
        .content-img-holder { width: 250px; height: 250px; border: 2px dashed #bdc3c7; border-radius: 8px; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #fafafa; }
        .content-img-holder img { width: 100%; height: 100%; object-fit: cover; }
        
        .placeholder-text { color: #bdc3c7; font-style: italic; }
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: auto; }
        .clear-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

    <!-- 1. BUILDER PANEL (Kahi se bhi control karein) -->
    <div class="builder-panel">
        <h2>Website Builder</h2>
        
        <!-- Hero Section Controls -->
        <div class="control-group">
            <label>Hero Title</label>
            <input type="text" id="heroTitleInput" value="My Awesome Offline Site" placeholder="Enter Heading...">
        </div>
        <div class="control-group">
            <label>Hero Background Image</label>
            <input type="file" id="heroBgInput" accept="image/*" data-target="hero-bg">
        </div>
        
        <hr style="border-color: #34495e;">

        <!-- Feature Section Controls -->
        <div class="control-group">
            <label>Feature Title</label>
            <input type="text" id="featureTitleInput" value="About Our Project" placeholder="Enter sub-heading...">
        </div>
        <div class="control-group">
            <label>Feature Image</label>
            <input type="file" id="featureImgInput" accept="image/*" data-target="feature-img">
        </div>
        <div class="control-group">
            <label>Image Position</label>
            <select id="imgPosition">
                <option value="right">Right Side</option>
                <option value="left">Left Side</option>
            </select>
        </div>

        <button class="clear-btn" id="clearStorageBtn">Clear Layout Data</button>
    </div>

    <!-- 2. PREVIEW WORKSPACE (Online jaisa live preview) -->
    <div class="preview-workspace">
        <div class="website-canvas">
            
            <!-- Dynamic Hero Component -->
            <div class="hero-banner" id="heroBanner">
                <h1 id="heroTitle">My Awesome Offline Site</h1>
                <p>Built completely offline without any servers.</p>
            </div>
            
            <!-- Dynamic Content Component -->
            <div class="content-section" id="contentSection">
                <div class="content-text">
                    <h3 id="featureTitle">About Our Project</h3>
                    <p>Yahan aap jo bhi text change karenge ya image dalenge, vo turant apke browser me bina internet ke save ho jayegi. Page refresh karne par bhi data gayab nahi hoga!</p>
                </div>
                <div class="content-img-holder" id="featureImgHolder">
                    <span class="placeholder-text" id="placeholderTxt">No Image Uploaded</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // IndexedDB Configuration for handling large offline images
        let db;
        const request = indexedDB.open("OfflineBuilderDB", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("siteData")) {
                db.createObjectStore("siteData");
            }
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadOfflineData(); // DB khulne ke baad saved data load karein
        };

        // --- Helper Functions to Save & Get Data from IndexedDB ---
        function saveToDB(key, val) {
            const tx = db.transaction("siteData", "readwrite");
            tx.objectStore("siteData").put(val, key);
        }

        function loadOfflineData() {
            const tx = db.transaction("siteData", "readonly");
            const store = tx.objectStore("siteData");

            // Load Texts
            store.get("heroTitle").onsuccess = (e) => {
                if(e.target.result) {
                    document.getElementById('heroTitle').innerText = e.target.result;
                    document.getElementById('heroTitleInput').value = e.target.result;
                }
            };
            store.get("featureTitle").onsuccess = (e) => {
                if(e.target.result) {
                    document.getElementById('featureTitle').innerText = e.target.result;
                    document.getElementById('featureTitleInput').value = e.target.result;
                }
            };
            store.get("imgPosition").onsuccess = (e) => {
                if(e.target.result) {
                    document.getElementById('imgPosition').value = e.target.result;
                    toggleLayoutDirection(e.target.result);
                }
            };

            // Load Images
            store.get("heroBg").onsuccess = (e) => {
                if(e.target.result) {
                    document.getElementById('heroBanner').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(${e.target.result})`;
                }
            };
            store.get("featureImg").onsuccess = (e) => {
                if(e.target.result) {
                    renderFeatureImage(e.target.result);
                }
            };
        }

        // --- Live Preview Event Listeners ---

        // Text input handles
        document.getElementById('heroTitleInput').addEventListener('input', (e) => {
            document.getElementById('heroTitle').innerText = e.target.value;
            saveToDB("heroTitle", e.target.value);
        });

        document.getElementById('featureTitleInput').addEventListener('input', (e) => {
            document.getElementById('featureTitle').innerText = e.target.value;
            saveToDB("featureTitle", e.target.value);
        });

        // Dropdown layout handler
        document.getElementById('imgPosition').addEventListener('change', (e) => {
            toggleLayoutDirection(e.target.value);
            saveToDB("imgPosition", e.target.value);
        });

        function toggleLayoutDirection(val) {
            const section = document.getElementById('contentSection');
            if(val === 'left') {
                section.classList.add('reverse');
            } else {
                section.classList.remove('reverse');
            }
        }

        // --- File Upload Processing (The Core Logic) ---
        const fileInputs = [document.getElementById('heroBgInput'), document.getElementById('featureImgInput')];

        fileInputs.forEach(input => {
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                const targetType = e.target.getAttribute('data-target');
                
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const base64Data = event.target.result;

                        if (targetType === 'hero-bg') {
                            document.getElementById('heroBanner').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(${base64Data})`;
                            saveToDB("heroBg", base64Data);
                        } else if (targetType === 'feature-img') {
                            renderFeatureImage(base64Data);
                            saveToDB("featureImg", base64Data);
                        }
                    };
                    reader.readAsDataURL(file); // File ko base64 data uri me convert kar raha hai
                }
            });
        });

        function renderFeatureImage(src) {
            const holder = document.getElementById('featureImgHolder');
            holder.innerHTML = `<img src="${src}" alt="Feature Image">`;
        }

        // Reset system
        document.getElementById('clearStorageBtn').addEventListener('click', () => {
            if(confirm("Kya aap saara offline saved layout and images delete karna chahte hain?")) {
                const tx = db.transaction("siteData", "readwrite");
                tx.objectStore("siteData").clear().onsuccess = () => {
                    location.reload();
                };
            }
        });
    </script>
</body>
</html>
